# Tobiuo Linux Debos Recipe File
{{- $architecture := "amd64" -}}
{{- $suite := "trixie" -}}
{{- $os_name := "tobiuo-linux" -}}

# The 'architecture' property MUST be at the top level
architecture: {{ $architecture }}

actions:
  - action: debootstrap
    suite: {{ $suite }}
    architecture: {{ $architecture }}
    mirror: http://deb.debian.org/debian
    components: [main, contrib, non-free, non-free-firmware]

  - action: apt
    description: Install core packages
    packages:
      - sudo
      - network-manager
      - ca-certificates
      - curl
      - gnupg
      - sddm
      - kde-plasma-desktop
      - plasma-nm
      - calamares
      - calamares-settings-debian
      - libkpmcore12 
      - firmware-linux
      - firmware-misc-nonfree

  - action: overlay
    description: Apply user skeleton (skel) and branding
    source: overlays

  - action: run
    description: Execute post-install customization
    chroot: true
    script: scripts/customize.sh

  - action: image-partition
    imagename: out/{{ $os_name }}.img
    imagesize: "10GB"
    partitiontype: msdos
    mountpoints:
      - mountpoint: /
        partition: root
    partitions:
      - name: root
        fs: ext4
        start: 0%
        end: 100%
        flags: [ boot ]
    # Correct way to compress the image
    compression: gz
